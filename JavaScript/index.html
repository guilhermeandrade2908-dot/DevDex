<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pokedex-case">

        <div class="pokedex-topo">
            <div class="luz-azul"></div>
            <div class="luzes-pequenas">
                <div class="luz-vermelha"></div>
                <div class="luz-amarela"></div>
                <div class="luz-verde"></div>
            </div>
        </div>

        <header>
            <h1 id="title">POKÉDEX</h1>
            <div class="pokedex-tela">
                <p id="mensagem">Digite seu nome para iniciar sua jornada de mestre pokémon!</p>

                <div id="pergunta">
                    <input type="text" id="nomeTreinador" placeholder="Nome do Treinador">
                    <button id="btnJornada">Começar Jornada</button>
                </div>
            </div>
        </header>
            
        
        <div id="areaCadastro" class="aba-conteudo">
            <h3>Novo Pokémon</h3>
            <input type="text" id="pokeNome" placeholder="Nome: (Ex: Pikachu)"><br><br>
            <input type="text" id="pokeTipo" placeholder="Tipo: (Ex: Elétrico)"><br><br>
            <input type="number" id="pokeNivel" placeholder="Nível: (Ex: 15)"><br><br>
            <button id="btnCadastrar">Salvar na Pokédex</button>
            <p id="msgCadastro"></p>
        </div>
        
        <div id="areaLista" class="aba-conteudo">
            <h3>Meus Pokémon Registrados</h3>
            <div id="listaPokemon"></div>
        </div>
        
        <div id="areaBusca" class="aba-conteudo">
            <h3>Buscar Pokémon</h3>
            <input type="text" id="buscaNome" placeholder="Digite o nome do Pokémon que deseja buscar"><br><br>
            <button id="btnExecutarBusca">Buscar</button>
            <div id="resultadoBusca"></div>
        </div>
        
        <div id="menuPokedex" class="pokedex-btn" style="display: none;">
            <button id="btnAbaCadastrar" class="btn-console azul">Cadastrar Pokémon</button>
            <button id="btnAbaListar" class="btn-console verde">Listar Pokémon</button>
            <button id="btnAbaBuscar" class="btn-console amarelo">Buscar Pokémon</button>
            <button id="btnSair">Sair</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
