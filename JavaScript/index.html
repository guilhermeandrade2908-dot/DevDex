<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="title">POKÉDEX</h1>
        <h3 id="pergunta">Qual é o seu nome, treinador?</h3>
        <input type="text" id="nomeTreinador" placeholder="Ex: Ash">
        <p id="mensagem"></p><br>
        <button id="btnJornada">Começar Jornada</button>
    </header>

    <div id="menuPokedex">
        
        <button id="btnCdastrar">Cadastrar Pokémon</button>
        <button id="btnListar">Listar Pokémon</button>
        <button id="btnBuscar">Buscar Pokémon</button>
        <button id="btnSair">Sair</button>

        <div id="areaCadastro">
            <h3>Novo Pokémon</h3>
            <input type="text" id="pokeNome" placeholder="Nome: (Ex: Pikachu)"><br><br>
            <input type="text" id="pokeTipo" placeholder="Tipo: (Ex: Elétrico)"><br><br>
            <input type="number" id="pokeNivel" placeholder="Nível: (Ex: 15)"><br><br>
            <button id="btnCadastrar">Salvar na Pokédex</button>
            <p id="msgCadastro"></p>
        </div>

        <div id="areaLista">
            <h3>Meus Pokémon Registrados</h3>
            <div id="listaPokemon"></div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
